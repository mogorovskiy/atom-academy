<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вход | Atom Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../../css/main-pages.css">
</head>
<body class="bg-dark page-background">

<header class="header-minimal">
    <div class="brand-top-left">
        <a class="navbar-brand" href="../landing-page.html">
            <span class="fw-bold text-uppercase tracking-wider">Atom Academy</span>
        </a>
    </div>
</header>

<main class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="liquid-glass p-5 w-100" style="max-width: 500px;">
        <h2 class="text-center text-uppercase fw-bold mb-4" style="font-family: 'Orbitron'; color: #00ff66;">Login</h2>

        <form id="login-form">
            <div class="mb-3">
                <label class="form-label small text-uppercase">Логин (Email)</label>
                <input type="email" class="form-control auth-input" placeholder="admin@atom.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label small text-uppercase">Пароль</label>
                <input type="password" class="form-control auth-input" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-auth mb-3">Инициализировать</button>

            <div class="text-center">
                <span class="small text-secondary">Нет аккаунта?</span>
                <a href="registration-page.html" class="nav-link d-inline ms-1 p-0" style="color: #00ff66 !important;">Зарегистрироваться</a>
            </div>
        </form>
    </div>
</main>

</body>
</html>
