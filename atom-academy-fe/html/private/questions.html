<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Уроки курса | Atom Academy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/main-pages.css">
</head>
<body class="bg-dark page-background">

<header class="header-minimal">
    <div class="brand-top-left">
        <a class="navbar-brand d-flex align-items-center" href="../public/home-page.html">
            <span class="fw-bold text-uppercase tracking-wider">Atom Academy</span>
        </a>
    </div>
    <div class="action-top-right">
        <a href="#" class="btn-minimal">Стать автором</a>
    </div>
</header>

<main class="container">
    <div class="text-center mb-5 roadmap-text">
        <h2 id="course-title" class="text-uppercase fw-bold">Загрузка названия...</h2>
    </div>

    <div id="questions-list" class="d-flex flex-column align-items-center w-100">
        <div class="spinner-border text-success" role="status"></div>
    </div>
</main>

<div class="modal fade" id="answerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark text-light border-secondary">
            <div class="modal-header border-secondary">
                <h5 class="modal-title text-info" id="modalTitle">Вопрос</h5>
            </div>
            <div class="modal-body" id="modalBody">
            </div>
            <div class="modal-footer border-secondary">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
            </div>
        </div>
    </div>
</div>

<script src="../../js/config.js"></script>
<script src="../../js/load-questions.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
