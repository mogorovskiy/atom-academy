<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Уроки курса | Atom Academy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body class="bg-dark page-background">

<nav class="navbar navbar-dark floating-navbar container">
    <div class="container-fluid justify-content-between">
        <a class="navbar-brand d-flex align-items-center" href="../public/landing-page.html">
            <span class="fw-bold text-uppercase">Atom Academy</span>
        </a>
        <div class="d-flex">
            <a href="../public/landing-page.html" class="nav-link">← Назад</a>
        </div>
    </div>
</nav>

<main class="container">
    <div class="liquid-glass text-center mb-5" style="max-width: 800px; margin: 0 auto;">
        <h2 id="course-title" class="text-success fw-bold">Загрузка...</h2>
        <p class="text-light mb-0">Список уроков и материалов</p>
    </div>

    <div id="questions-list" class="d-flex flex-column align-items-center w-100">
        <div class="spinner-border text-success" role="status"></div>
    </div>
</main>

<div class="modal fade" id="answerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark text-light border-secondary">
            <div class="modal-header border-secondary">
                <h5 class="modal-title text-info" id="modalTitle">Вопрос</h5>
            </div>
            <div class="modal-body" id="modalBody">
            </div>
            <div class="modal-footer border-secondary">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
            </div>
        </div>
    </div>
</div>

<script src="../../js/config.js"></script>
<script src="../../js/load-questions.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
